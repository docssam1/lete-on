<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>필즈 선발 대비 모의고사 | G-FIELD</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#02050b;--sur:#080d14;--g:#d4af37;--g2:#f8dd83;--gg:rgba(212,175,55,.18);
  --w:#f0ece2;--mu:#7a8a9a;--bd:rgba(212,175,55,.15);--b2:rgba(255,255,255,.07);--nv:#0d1b2a;
  --ok:#22c55e;--no:#ef4444;--ok-bg:rgba(34,197,94,.08);--no-bg:rgba(239,68,68,.08);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);font-family:'Noto Sans KR',sans-serif;color:var(--w);min-height:100vh;overflow-x:hidden}

/* ── TOP ── */
.top{background:rgba(2,5,11,.96);backdrop-filter:blur(16px);border-bottom:1px solid var(--bd);padding:10px 14px;position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.top-logo{width:72px;filter:brightness(0) invert(1);opacity:.9;flex-shrink:0}
.top-sep{width:1px;height:20px;background:var(--bd);flex-shrink:0}
.top-title{font-size:12px;font-weight:900;color:var(--g2);flex:1;min-width:80px}
.top-name-inp{height:36px;background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.12);border-radius:8px;color:var(--w);font-size:13px;font-weight:700;font-family:'Noto Sans KR',sans-serif;padding:0 12px;outline:none;width:120px;transition:border-color .2s}
.top-name-inp:focus{border-color:var(--g)}
.top-name-inp::placeholder{color:rgba(255,255,255,.25);font-weight:400}
.top-upload{height:36px;padding:0 12px;border-radius:8px;border:1.5px solid var(--bd);background:rgba(212,175,55,.06);color:var(--g2);font-size:12px;font-weight:900;font-family:'Noto Sans KR',sans-serif;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:6px}
.top-upload:active{transform:scale(.96)}
#fileInput{display:none}
.ai-status{font-size:11px;padding:5px 10px;border-radius:6px;display:none}
.ai-loading{background:rgba(212,175,55,.1);color:var(--g2);border:1px solid var(--bd);display:flex;align-items:center;gap:6px}
.ai-done{background:rgba(34,197,94,.1);color:var(--ok);border:1px solid rgba(34,197,94,.25)}
.spinner{width:14px;height:14px;border:2px solid rgba(212,175,55,.3);border-top-color:var(--g);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── MAIN ── */
main{max-width:900px;margin:0 auto;padding:14px}

/* ── SECTION ── */
.sec-title{font-size:10px;font-weight:900;letter-spacing:.15em;color:var(--g);margin:20px 0 10px;display:flex;align-items:center;gap:8px}
.sec-title::after{content:'';flex:1;height:1px;background:var(--bd)}
.sec-sub{font-size:10px;color:var(--mu)}

/* ── Q GRID ── */
.q-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
@media(max-width:480px){.q-grid{grid-template-columns:repeat(2,1fr)}}

/* ── Q CARD ── */
.q-card{background:var(--sur);border:1.5px solid var(--b2);border-radius:12px;padding:10px;transition:border-color .2s,background .2s;position:relative;overflow:hidden}
.q-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;opacity:0;transition:opacity .2s}
.q-card.correct{border-color:rgba(34,197,94,.4);background:var(--ok-bg)}
.q-card.correct::before{background:var(--ok);opacity:1}
.q-card.wrong{border-color:rgba(239,68,68,.4);background:var(--no-bg)}
.q-card.wrong::before{background:var(--no);opacity:1}
.q-card-top{display:flex;align-items:center;gap:5px;margin-bottom:8px}
.q-n{font-family:'DM Serif Display',serif;font-size:16px;color:var(--g2);min-width:24px}
.q-t{font-size:8px;font-weight:900;padding:2px 6px;border-radius:20px;letter-spacing:.04em;white-space:nowrap}
.t-식의계산{background:rgba(96,165,250,.12);color:#60a5fa;border:1px solid rgba(96,165,250,.2)}
.t-수{background:rgba(167,139,250,.12);color:#a78bfa;border:1px solid rgba(167,139,250,.2)}
.t-논리추리{background:rgba(251,146,60,.12);color:#fb923c;border:1px solid rgba(251,146,60,.2)}
.t-도형{background:rgba(34,197,94,.12);color:#22c55e;border:1px solid rgba(34,197,94,.2)}
.t-규칙{background:rgba(244,114,182,.12);color:#f472b6;border:1px solid rgba(244,114,182,.2)}
.q-icon{margin-left:auto;font-size:14px;opacity:0;transition:opacity .2s}
.correct .q-icon-ok{opacity:1}
.wrong .q-icon-no{opacity:1}
.q-inp{width:100%;height:38px;background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.1);border-radius:8px;color:var(--w);font-size:15px;font-weight:700;font-family:'Noto Sans KR',sans-serif;text-align:center;outline:none;padding:0 6px;transition:border-color .2s}
.q-inp:focus{border-color:var(--g)}
.correct .q-inp{border-color:rgba(34,197,94,.5);background:rgba(34,197,94,.06)}
.wrong .q-inp{border-color:rgba(239,68,68,.5);background:rgba(239,68,68,.06)}
.q-ph{font-size:9px;color:var(--mu);margin-top:5px;text-align:center;line-height:1.4}
/* dual */
.q-dual{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.q-dual label{font-size:8px;color:var(--mu);display:block;margin-bottom:2px;font-weight:700}
/* animal */
.q-animal{display:grid;grid-template-columns:1fr 1fr 1fr;gap:3px}
.q-a-btn{padding:5px 2px;border-radius:6px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.04);color:var(--w);font-size:9px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;text-align:center;transition:all .15s;line-height:1.3}
.q-a-btn.sel{border-color:var(--g);background:rgba(212,175,55,.12);color:var(--g2)}
.q-a-order{font-size:8px;color:var(--mu);margin-top:4px;text-align:center}
.q-a-clr{font-size:8px;color:var(--mu);background:none;border:none;cursor:pointer;font-family:'Noto Sans KR',sans-serif;text-decoration:underline;display:block;margin:2px auto 0}
/* sym */
.q-sym-row{display:flex;gap:3px;margin-bottom:4px;flex-wrap:wrap}
.q-sym-lbl{font-size:8px;color:var(--mu);font-weight:700;margin-bottom:3px}
.q-s-btn{padding:4px 6px;border-radius:5px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.04);color:var(--w);font-size:12px;cursor:pointer;transition:all .15s;min-width:28px;text-align:center}
.q-s-btn.sel{border-color:var(--g);background:rgba(212,175,55,.12);color:var(--g2)}

/* ── PROGRESS ── */
.prog-bar-wrap{margin:14px 0 6px;background:rgba(255,255,255,.06);border-radius:999px;height:4px;overflow:hidden}
.prog-bar-fill{height:100%;background:linear-gradient(90deg,var(--g),var(--g2));border-radius:999px;transition:width .3s}
.prog-txt{font-size:10px;color:var(--mu);text-align:right;margin-bottom:10px}

/* ── SUBMIT ── */
.submit-area{margin:20px 0;text-align:center}
.submit-btn{display:inline-block;padding:16px 48px;background:linear-gradient(135deg,var(--g),var(--g2));color:var(--nv);font-size:16px;font-weight:900;font-family:'Noto Sans KR',sans-serif;border:none;border-radius:14px;cursor:pointer;box-shadow:0 8px 28px rgba(212,175,55,.25)}
.submit-btn:active{transform:scale(.97)}
.score-summary{display:flex;align-items:center;justify-content:center;gap:16px;margin:6px 0 0;font-size:11px;color:var(--mu)}
.score-ok{color:var(--ok);font-weight:900}
.score-no{color:var(--no);font-weight:900}

/* ── RESULT ── */
#result{display:none;margin-top:20px;animation:fadeUp .5s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
.res-hero{background:linear-gradient(135deg,rgba(212,175,55,.1),rgba(212,175,55,.04));border:1px solid var(--bd);border-radius:16px;padding:22px;text-align:center;margin-bottom:12px;position:relative;overflow:hidden}
.res-hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(212,175,55,.12),transparent 60%);pointer-events:none}
.res-nm{font-size:12px;color:var(--mu);position:relative;margin-bottom:8px}
.res-sc{font-family:'DM Serif Display',serif;font-size:68px;color:var(--g);line-height:1;text-shadow:0 0 32px var(--gg);position:relative}
.res-sc-s{font-size:13px;color:var(--mu);position:relative}
.res-lv{display:inline-block;font-size:16px;font-weight:900;padding:7px 22px;border-radius:30px;margin-top:12px;position:relative}
.lv-s{background:rgba(212,175,55,.2);border:1px solid var(--g);color:var(--g2)}
.lv-e1{background:rgba(96,165,250,.12);border:1px solid rgba(96,165,250,.3);color:#60a5fa}
.lv-e2{background:rgba(167,139,250,.12);border:1px solid rgba(167,139,250,.3);color:#a78bfa}
.lv-j{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.7)}
.r-card{background:var(--sur);border:1px solid var(--b2);border-radius:14px;padding:16px;margin-bottom:10px}
.r-ct{font-size:10px;font-weight:900;color:var(--g);letter-spacing:.12em;margin-bottom:14px}
.r-row{display:grid;grid-template-columns:72px 1fr 42px;align-items:center;gap:8px;margin-bottom:10px}
.r-row:last-child{margin-bottom:0}
.r-tn{font-size:12px;font-weight:700;color:var(--w)}
.r-bg{background:rgba(255,255,255,.06);border-radius:999px;height:6px;overflow:hidden}
.r-fill{height:100%;border-radius:999px;transition:width .8s cubic-bezier(.22,1,.36,1)}
.r-p{font-size:11px;font-weight:900;color:var(--g2);text-align:right}
.f-식의계산{background:linear-gradient(90deg,#3b82f6,#60a5fa)}.f-수{background:linear-gradient(90deg,#8b5cf6,#a78bfa)}.f-논리추리{background:linear-gradient(90deg,#ea580c,#fb923c)}.f-도형{background:linear-gradient(90deg,#16a34a,#22c55e)}.f-규칙{background:linear-gradient(90deg,#db2777,#f472b6)}
.f-키{background:linear-gradient(90deg,var(--g),var(--g2))}.f-초{background:linear-gradient(90deg,#0891b2,#22d3ee)}.f-입{background:linear-gradient(90deg,#7c3aed,#a78bfa)}.f-심{background:linear-gradient(90deg,#be123c,#f43f5e)}
.calc-badge{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:30px;font-size:13px;font-weight:900}
.cb-우{background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.3);color:var(--ok)}
.cb-약{background:rgba(251,191,36,.12);border:1px solid rgba(251,191,36,.3);color:#fbbf24}
.cb-연{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);color:var(--no)}
.r-comment{font-size:12px;color:rgba(255,255,255,.75);line-height:1.8;background:rgba(212,175,55,.04);border-left:3px solid var(--g);padding:12px 14px;border-radius:0 10px 10px 0;margin-top:8px}
.s-item{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--b2)}
.s-item:last-child{border-bottom:none}
.s-tn{font-size:13px;font-weight:700;color:var(--w)}
.s-vol{font-size:10px;color:var(--mu);margin-top:2px}
.s-link{font-size:11px;font-weight:900;color:var(--g);background:rgba(212,175,55,.08);border:1px solid var(--bd);padding:5px 12px;border-radius:8px;text-decoration:none;white-space:nowrap}
.w-list{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.w-item{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.18);border-radius:8px;padding:3px 9px;display:flex;align-items:center;gap:4px}
.w-num{font-size:10px;font-weight:900;color:var(--no)}
.w-tp{font-size:9px;color:var(--mu)}
.res-actions{display:flex;gap:10px;padding:14px 0;flex-wrap:wrap}
.res-print{flex:1;height:48px;background:linear-gradient(135deg,var(--g),var(--g2));color:var(--nv);font-size:14px;font-weight:900;font-family:'Noto Sans KR',sans-serif;border:none;border-radius:12px;cursor:pointer}
.res-consult{flex:1;height:48px;background:rgba(255,255,255,.06);border:1px solid var(--b2);color:rgba(255,255,255,.7);font-size:13px;font-weight:700;font-family:'Noto Sans KR',sans-serif;border-radius:12px;cursor:pointer;text-decoration:none;display:flex;align-items:center;justify-content:center}

/* ── PRINT ── */
@media print{
  body{background:#fff!important;color:#111!important}
  .top,.submit-area,.res-actions,.s-link{display:none!important}
  .q-grid,.sec-title,main>*:not(#result){display:none!important}
  #result{display:block!important;margin:0!important}
  .res-hero{background:#fffbec!important;border-color:#d4af37!important}
  .res-sc{color:#b8960c!important;text-shadow:none!important}
  .r-card{background:#f9f9f9!important;border-color:#e0e0e0!important}
  .r-tn,.s-tn{color:#111!important}
  .r-comment{background:#fffbec!important;color:#333!important}
  .r-bg{background:#e0e0e0!important}
  *{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  @page{margin:1.2cm}
}
</style>
</head>

<div class="top">

<!-- 연산 14문항 -->
<div class="sec-title">연산 테스트 <span class="sec-sub">14문항 · 덧셈 7 + 뺄셈 7</span></div>
<div class="q-grid" id="cGrid"></div>

<!-- 채점 -->
<div class="submit-area">

</div>

<!-- 결과 -->
<div id="result"></div>

</main>

  {mn:88,mx:95,lv:'E1합격 · S반 GO',cls:'lv-s',tx:'E1반 합격이 확실합니다. 약점 문항을 학습해주세요. 소마도 다니면서 외부 학원에서 2회 이상 학습 중이라면 둘 다 유지하면서 프리미어 대비와 S반 관리까지 이어가기를 추천합니다.'},
  {mn:84,mx:87,lv:'E1합격',cls:'lv-e1',tx:'E1반 합격이 확실합니다. 약점 유형을 꼭 학습해주세요.'},
  {mn:80,mx:83,lv:'E1합격',cls:'lv-e1',tx:'E1반 합격 가능성이 높습니다. 약점 유형을 꼭 학습해주세요. 조금만 노력하면 충분히 E1 점수가 나올 수 있습니다.'},
  {mn:76,mx:79,lv:'E2합격',cls:'lv-e2',tx:'레벨은 E2가 나왔지만 E1반 합격 가능성이 높습니다. 약점 유형을 꼭 학습해주세요.'},
  {mn:68,mx:75,lv:'E2합격',cls:'lv-e2',tx:'E2레벨은 당연하고 E1도 연습하면 가능하니 남은기간 집중적으로 복습과 예습에 힘써주세요. 연산이 잘 되어 있고 선행이 되어 있다면 1달 안에도 E1반으로 승급될 가능성도 높습니다.'},
  {mn:60,mx:67,lv:'E2합격',cls:'lv-e2',tx:'E2레벨은 당연하고 E1도 연습하면 가능하니 남은기간 집중적으로 복습과 예습에 힘써주세요.'},
  {mn:52,mx:59,lv:'주 1회 높은 반',cls:'lv-j',tx:'주1회 높은반 레벨이지만 시험 대비를 집중하면 주2회도 충분히 가능한 점수입니다.'},
  {mn:0,mx:51,lv:'주 1회 낮은 반',cls:'lv-j',tx:'주 1회 낮은반 레벨이지만 충분히 연습하면 주2회도 나올 수 있습니다. 교과, 사고력 학습의 균형이 필요합니다.'},
];
const CALC_TX={
  우:'연산 진단은 우수입니다. 필즈 시험에서의 연산은 두자리+두자리 또는 두자리-두자리까지 출제됩니다. 학생은 시험에 문제 없는 연산 실력을 가졌습니다. 꾸준히 유지해 주세요.',
  약:'연산 진단은 약간 실수입니다. 필즈 시험에서의 연산은 두자리+두자리 또는 두자리-두자리까지 출제됩니다. 실수하지 않고 속도가 빠르도록 여러 번 연습해야 합니다.',
  연:'연산 진단은 연습 필요입니다. 필즈 시험에서의 연산은 두자리+두자리 또는 두자리-두자리까지 출제됩니다. 우선 연산에 집중하여 학습해주세요. 기적의 계산법 3-4권 수준이 필요합니다.',
};
const TV={
  '식의계산':{vol:'Vol.1 · Vol.2',url:'https://youtu.be/7aPj5IJUzQM',lb:'개념영상'},
  '수':{vol:'Vol.3 · Vol.4',url:'https://youtu.be/mq-1VxjLzMk',lb:'유형반복'},
  '논리추리':{vol:'Vol.2',url:'https://youtu.be/TOHw8sCumHY',lb:'체크체크'},
  '도형':{vol:'Final',url:'https://youtu.be/FC4W2bRJwKc',lb:'학습영상'},
  '규칙':{vol:'Vol.4',url:'https://youtu.be/neRIODxo13I',lb:'개념영상'},
};
const TYPST={
  '식의계산':'t-식의계산','수':'t-수','논리추리':'t-논리추리','도형':'t-도형','규칙':'t-규칙',
};

let anim=[],s12=['',''];

function nm(s){return String(s||'').trim().replace(/\s+/g,'').replace(/，/g,',');}
function match(u,c){return nm(u)===nm(c);}

function getVal(i){
  const q=QS[i];
  if(q.in==='num'){const el=document.getElementById('qi'+i);return el?el.value:'';}
  if(q.in==='dual'){
    const a=document.getElementById('qi'+i+'a')?.value||'',b=document.getElementById('qi'+i+'b')?.value||'';
    return a&&b?a+','+b:'';
  }
  if(q.in==='animal')return anim.join(',');
  if(q.in==='sym')return s12[0]&&s12[1]?s12[0]+','+s12[1]:'';
  return '';
}

function setVal(i,v){
  const q=QS[i];
  if(q.in==='num'){const el=document.getElementById('qi'+i);if(el){el.value=v;checkQ(i);}}
  if(q.in==='dual'){
    const parts=v.split(',');
    const a=document.getElementById('qi'+i+'a'),b=document.getElementById('qi'+i+'b');
    if(a){a.value=parts[0]||'';}if(b){b.value=parts[1]||'';}checkQ(i);
  }
}

function checkQ(i){
  const v=getVal(i);const q=QS[i];
  const card=document.getElementById('qc'+i);if(!card)return;
  const icon_ok=card.querySelector('.q-icon-ok');
  const icon_no=card.querySelector('.q-icon-no');
  if(!v.trim()){card.className='q-card';if(icon_ok)icon_ok.style.opacity=0;if(icon_no)icon_no.style.opacity=0;}
  else if(match(v,q.a)){card.className='q-card correct';if(icon_ok)icon_ok.style.opacity=1;if(icon_no)icon_no.style.opacity=0;}
  else{card.className='q-card wrong';if(icon_ok)icon_ok.style.opacity=0;if(icon_no)icon_no.style.opacity=1;}
  updateProg();
}

function checkC(i){
  const all=[...CA,...CS];
  const el=document.getElementById('ci'+i);if(!el)return;
  const v=el.value.trim();const c=document.getElementById('cc'+i);if(!c)return;
  if(!v){c.className='c-card';}
  else if(nm(v)===nm(all[i].a)){c.className='c-card correct';}
  else{c.className='c-card wrong';}
}

function updateProg(){
  let d=0;
  QS.forEach((_,i)=>{if(getVal(i).trim())d++;});
  const p=d/25*100;
  document.getElementById('progFill').style.width=p+'%';
  document.getElementById('progTxt').textContent=d+' / 25 입력';
}

function buildQ(){
  const g=document.getElementById('qGrid');g.innerHTML='';
  QS.forEach((q,i)=>{
    const c=document.createElement('div');c.className='q-card';c.id='qc'+i;
    c.innerHTML=`
      <div class="q-card-top">
        <div class="q-n">${String(q.id).padStart(2,'0')}</div>
        <span class="q-t ${TYPST[q.t]}">${q.t}</span>
        <span class="q-icon q-icon-ok" style="opacity:0">✅</span>
        <span class="q-icon q-icon-no" style="opacity:0;position:absolute;right:10px;top:10px">❌</span>
      </div>
      ${buildQIn(q,i)}
      <div class="q-ph">${q.tp}</div>`;
    g.appendChild(c);
  });
}

function buildQIn(q,i){
  if(q.in==='num')return`<input class="q-inp" type="text" inputmode="numeric" id="qi${i}" placeholder="${q.ph}" oninput="checkQ(${i})">`;
  if(q.in==='dual')return`<div class="q-dual">
    <div><label>${q.lb[0]}</label><input class="q-inp" type="text" inputmode="numeric" placeholder="${q.ph[0]}" id="qi${i}a" oninput="checkQ(${i})"></div>
    <div><label>${q.lb[1]}</label><input class="q-inp" type="text" inputmode="numeric" placeholder="${q.ph[1]}" id="qi${i}b" oninput="checkQ(${i})"></div>
  </div>`;
  if(q.in==='animal')return`<div>
    <div class="q-animal">
      <button class="q-a-btn" onclick="selA('다람쥐',this)">🐿다람쥐</button>
      <button class="q-a-btn" onclick="selA('거북',this)">🐢거북</button>
      <button class="q-a-btn" onclick="selA('토끼',this)">🐇토끼</button>
    </div>
    <div class="q-a-order" id="ao">가벼운 순</div>
    <button class="q-a-clr" onclick="clrA()">초기화</button>
  </div>`;
  if(q.in==='sym')return`<div>
    <div class="q-sym-lbl">① 빈칸</div>
    <div class="q-sym-row" id="sga">${SYMS.map(s=>`<button class="q-s-btn" onclick="setSym(0,'${s}',this)">${s}</button>`).join('')}</div>
    <div class="q-sym-lbl">② 빈칸</div>
    <div class="q-sym-row" id="sgb">${SYMS.map(s=>`<button class="q-s-btn" onclick="setSym(1,'${s}',this)">${s}</button>`).join('')}</div>
  </div>`;
}

function buildC(){
  const g=document.getElementById('cGrid');g.innerHTML='';
  const all=[...CA,...CS];
  all.forEach((c,i)=>{
    const d=document.createElement('div');d.className='c-card';d.id='cc'+i;
    d.innerHTML=`<div class="c-expr" style="font-size:13px;font-weight:700;text-align:center;color:var(--w)">${c.e}</div>
    <input class="q-inp" type="text" inputmode="numeric" id="ci${i}" placeholder="□" style="text-align:center" oninput="checkC(${i})">`;
    g.appendChild(d);
  });
}

function selA(n,btn){
  if(anim.includes(n))return;anim.push(n);btn.classList.add('sel');
  document.getElementById('ao').textContent=anim.join('→');
  checkQ(7);
}
function clrA(){
  anim=[];document.querySelectorAll('.q-a-btn').forEach(b=>b.classList.remove('sel'));
  document.getElementById('ao').textContent='가벼운 순';checkQ(7);
}
function setSym(pt,sym,btn){
  s12[pt]=sym;
  const g=document.getElementById(pt===0?'sga':'sgb');
  g.querySelectorAll('.q-s-btn').forEach(b=>b.classList.remove('sel'));btn.classList.add('sel');
  checkQ(11);
}
window.selA=selA;window.clrA=clrA;window.setSym=setSym;
window.checkQ=checkQ;window.checkC=checkC;

/* ── AI IMAGE ANALYSIS ── */
async function analyzeImage(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=async(e)=>{
    const b64=e.target.result.split(',')[1];
    const mediaType=file.type||'image/jpeg';
    document.getElementById('aiLoading').style.display='flex';
    document.getElementById('aiDone').style.display='none';
    try{
      const res=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          model:'claude-sonnet-4-6',
          max_tokens:1000,
          messages:[{
            role:'user',
            content:[
              {type:'image',source:{type:'base64',media_type:mediaType,data:b64}},
              {type:'text',text:`이것은 필즈 선발 대비 모의고사 시험지입니다.
학생이 작성한 답안을 보고 1번~25번까지의 답을 읽어주세요.
JSON 형식으로만 응답하세요 (다른 텍스트 없이): {"1":"답","2":"답","3":"답",...,"25":"답"}
- 동물 순서 문제(8번): 가장 가벼운부터 쉼표 구분 (예: "다람쥐,거북,토끼")
- 복수 답(11번,20번): 쉼표 구분 (예: "4,13")
- 읽을 수 없거나 없으면 "" 로 표시
- 반드시 JSON만 출력`}
            ]
          }]
        })
      });
      const data=await res.json();
      const text=data.content?.filter(c=>c.type==='text').map(c=>c.text).join('');
      const clean=text.replace(/```json|```/g,'').trim();
      const parsed=JSON.parse(clean);
      Object.entries(parsed).forEach(([k,v])=>{
        const i=parseInt(k)-1;
        if(i>=0&&i<25&&v){setVal(i,v);}
      });
      document.getElementById('aiLoading').style.display='none';
      document.getElementById('aiDone').style.display='flex';
      setTimeout(()=>document.getElementById('aiDone').style.display='none',3000);
    }catch(err){
      document.getElementById('aiLoading').style.display='none';
      alert('분석 중 오류가 발생했습니다. 직접 입력해주세요.');
    }
  };
  reader.readAsDataURL(file);
  input.value='';
}
window.analyzeImage=analyzeImage;

/* ── SUBMIT & RESULT ── */
function submitAll(){
  const mg=QS.map((q,i)=>match(getVal(i),q.a));
  const sc=mg.filter(Boolean).length*4;
  const tys=['식의계산','수','논리추리','도형','규칙'];
  const ts={};tys.forEach(t=>{ts[t]={tot:0,ok:0}});
  QS.forEach((q,i)=>{ts[q.t].tot++;if(mg[i])ts[q.t].ok++;});
  const ls={'키즈팩토':{tot:0,ok:0},'초등팩토':{tot:0,ok:0},'1031입문':{tot:0,ok:0},'1031심화':{tot:0,ok:0}};
  QS.forEach((q,i)=>{
    const k=q.lv.includes('키즈')?'키즈팩토':q.lv.includes('초등')?'초등팩토':q.lv.includes('심화')?'1031심화':'1031입문';
    ls[k].tot++;if(mg[i])ls[k].ok++;
  });
  const all=[...CA,...CS];
  const cg=all.map((c,i)=>{const el=document.getElementById('ci'+i);return el?nm(el.value)===nm(c.a):false;});
  const cw=cg.filter(v=>!v).length;
  const cl=cw===0?'우':cw<=2?'약':'연';
  const clLbl=cw===0?'우수':cw<=2?'약간 실수':'연습 필요';
  const clCls=cw===0?'cb-우':cw<=2?'cb-약':'cb-연';
  const li=(()=>{for(const d of LVLS)if(sc>=d.mn&&sc<=d.mx)return d;return LVLS[LVLS.length-1];})();
  const wq=QS.filter((q,i)=>!mg[i]);
  const weak=tys.filter(t=>ts[t].tot>0&&Math.round(ts[t].ok/ts[t].tot*100)<70);
  const p=(ok,tot)=>tot===0?0:Math.round(ok/tot*100);
  const nm2=document.getElementById('nameInp').value.trim()||'학생';

  // score summary
  document.getElementById('scoreSummary').innerHTML=`
    <span class="score-ok">✓ 맞음 ${mg.filter(Boolean).length}문항</span>
    <span class="score-no">✗ 틀림 ${mg.filter(v=>!v).length}문항</span>
    <span>→ ${sc}점</span>`;

  const r=document.getElementById('result');
  r.style.display='block';
  r.innerHTML=`
  <div class="res-hero">
    <div class="res-nm">${nm2} 학생 · 필즈 선발 대비 모의고사 진단 결과</div>
    <div class="res-sc">${sc}</div>
    <div class="res-sc-s">/ 100점 &nbsp;(25문항 × 4점)</div>
    <div class="res-lv ${li.cls}">${li.lv}</div>
  </div>
  <div class="r-card">
    <div class="r-ct">유형별 분석</div>
    ${tys.map(t=>`<div class="r-row"><span class="r-tn">${t}</span><div class="r-bg"><div class="r-fill f-${t}" style="width:${p(ts[t].ok,ts[t].tot)}%"></div></div><span class="r-p">${ts[t].ok}/${ts[t].tot}</span></div>`).join('')}
  </div>
  <div class="r-card">
    <div class="r-ct">난이도별 분석</div>
    ${[['키즈팩토','키'],['초등팩토','초'],['1031입문','입'],['1031심화','심']].map(([k,f])=>`<div class="r-row"><span class="r-tn" style="font-size:11px">${k}</span><div class="r-bg"><div class="r-fill f-${f}" style="width:${p(ls[k].ok,ls[k].tot)}%"></div></div><span class="r-p">${ls[k].ok}/${ls[k].tot}</span></div>`).join('')}
  </div>
  <div class="r-card">
    <div class="r-ct">연산 진단</div>
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px">
      <span class="calc-badge ${clCls}">${clLbl}</span>
      <span style="font-size:11px;color:var(--mu)">${14-cw}/14 정답</span>
    </div>
    <div class="r-comment">${CALC_TX[cl]}</div>
  </div>
  <div class="r-card">
    <div class="r-ct">학습 전략</div>
    <div class="r-comment">${li.tx}</div>
    <div style="font-size:11px;color:var(--mu);margin-top:10px;line-height:1.7">당부: 학원보다 연산 → 교과 → 사고력 순으로 균형이 맞아야 합니다.</div>
  </div>
  ${wq.length?`<div class="r-card"><div class="r-ct">틀린 문항 (${wq.length}개)</div>
    <div class="w-list">${wq.map(q=>`<div class="w-item"><span class="w-num">Q${q.id}</span><span class="w-tp">${q.tp.slice(0,8)}</span></div>`).join('')}</div></div>`:''}
  ${weak.length?`<div class="r-card"><div class="r-ct">약점 유형 학습</div>
    ${weak.map(t=>`<div class="s-item"><div><div class="s-tn">${t}</div><div class="s-vol">${TV[t].vol} · ${TV[t].lb}</div></div><a class="s-link" href="${TV[t].url}" target="_blank" rel="noopener">▶ 영상 보기</a></div>`).join('')}
  </div>`:''}
  <div class="res-actions">
    <button class="res-print" onclick="window.print()">🖨 진단지 인쇄</button>
    <a class="res-consult" href="https://naver.me/Ge7B7WcJ" target="_blank" rel="noopener">상담 신청하기 →</a>
  </div>`;
  r.scrollIntoView({behavior:'smooth',block:'start'});
}
window.submitAll=submitAll;

buildQ();buildC();
})();
</script>
