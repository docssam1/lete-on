name: Apply roadmap demo patch

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/_patch_roadmap_demo.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Apply surgical replacements
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p = Path('roadmap/roadmap_demo.html')
          s = p.read_text(encoding='utf-8')
          old_img = '<img class="pg-character" src="./roadmap v28_files/docssam.jpg" alt="독쌤">'
          new_img = '<img class="pg-character" src="https://raw.githubusercontent.com/docssam1/lete-on/main/roadmap/docssam.jpg" alt="독쌤">'
          css_anchor = '.approval-error{min-height:18px;margin-top:8px;color:#b91c1c;font-size:12px;font-weight:800}'
          css = '''.demo-notice{margin-top:18px;padding:14px 16px;border-radius:13px;text-align:left;
            background:linear-gradient(135deg,rgba(124,58,237,.06),rgba(30,58,138,.05));
            border:1px solid rgba(124,58,237,.18);position:relative}
          .demo-notice-tag{display:inline-block;font-size:10px;font-weight:900;letter-spacing:.12em;
            color:#fff;background:linear-gradient(135deg,#7c3aed,#1e3a8a);
            padding:3px 9px;border-radius:7px;margin-bottom:9px}
          .demo-notice p{margin:0;font-size:12px;line-height:1.7;color:#475569;font-weight:500;letter-spacing:-.01em}
          .demo-notice p b{color:#5b21b6;font-weight:800}'''
          html_anchor = '    <div class="approval-error" id="approvalError"></div>'
          html = '''    <div class="demo-notice">
              <span class="demo-notice-tag">DEMO</span>
              <p>본 화면은 <b>스탠다드 버전</b>의 체험용 데모입니다.<br>
              학습 환경·목표·<b>웩슬러 지수</b>를 반영한 <b>1:1 맞춤 분석</b>과<br>
              시기별 <b>시크릿 자료</b>는 정식 컨설팅에서 제공됩니다.</p>
            </div>'''
          assert s.count(old_img) == 1, 'image target count mismatch'
          assert s.count(css_anchor) >= 1, 'CSS anchor missing'
          assert s.count(html_anchor) == 1, 'HTML anchor count mismatch'
          assert '.demo-notice{' not in s, 'DEMO CSS already exists'
          assert '<div class="demo-notice">' not in s, 'DEMO HTML already exists'
          s = s.replace(old_img, new_img, 1)
          s = s.replace(css_anchor, css_anchor + '\n' + css, 1)
          s = s.replace(html_anchor, html_anchor + '\n' + html, 1)
          p.write_text(s, encoding='utf-8')
          PY
          rm .github/workflows/_patch_roadmap_demo.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add roadmap/roadmap_demo.html .github/workflows/_patch_roadmap_demo.yml
          git commit -m 'demo: 캐릭터 이미지 경로 raw URL 수정 + 로그인 DEMO 안내박스 추가'
          git push
